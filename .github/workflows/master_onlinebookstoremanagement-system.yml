name: Build and deploy Node.js app to Azure Web App - onlinebookstoremanagement-system

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # ✅ Install & build Frontend
      - name: Install and Build Frontend
        working-directory: Frontend
        run: |
          npm install
          npm run build

      # ✅ Install Backend
      - name: Install Backend Dependencies
        working-directory: Backend
        run: npm install

      # ✅ Upload only backend + frontend build
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            Backend
            Frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'onlinebookstoremanagement-system'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8E2E51EE723A43AEB407FCDDF42FC5AF }}
