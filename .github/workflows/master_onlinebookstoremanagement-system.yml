name: Build and deploy Node.js app to Azure Web App - onlinebookstoremanagement-system
 
on:

  push:

    branches:

      - master

  workflow_dispatch:
 
jobs:

  build:

    runs-on: ubuntu-latest

    permissions:

      contents: read
 
    steps:

      # 🔹 Checkout code

      - uses: actions/checkout@v4
 
      # 🔹 Setup Node (use stable version)

      - name: Set up Node.js

        uses: actions/setup-node@v3

        with:

          node-version: '20.x'
 
      # 🔹 Build Frontend

      - name: Install and Build Frontend

        working-directory: Frontend

        run: |

          npm install

          npm run build
 
      # 🔹 Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: Backend
        run: npm install

      # 🔹 Generate Prisma Client
      - name: Generate Prisma Client
        working-directory: Backend
        run: |
          chmod +x node_modules/.bin/prisma
          npx prisma generate

      # 🔥 Create FINAL deployable folder (IMPORTANT FIX)

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -r Backend/. deploy/
          mkdir -p deploy/public
          cp -r Frontend/dist/. deploy/public/
 
      # 🔹 Upload artifact

      - name: Upload artifact for deployment

        uses: actions/upload-artifact@v4

        with:

          name: node-app

          path: deploy
 
  deploy:

    runs-on: ubuntu-latest

    needs: build
 
    steps:

      # 🔹 Download artifact

      - name: Download artifact

        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
 
      # 🔹 Deploy to Azure

      - name: Deploy to Azure Web App

        uses: azure/webapps-deploy@v3

        with:

          app-name: 'onlinebookstoremanagement-system'

          slot-name: 'Production'

          package: .

          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8E2E51EE723A43AEB407FCDDF42FC5AF }}
 
